<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Platch Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ロゴ -->
  <img src="Platchlogo.png" class="logo">

  <!-- 説明 -->
  <div class="info">
    <h2>Information</h2>
    <p>色々なミニゲームが遊べます</p>
  </div>

  <!-- ゲーム一覧 -->
  <div class="game-list">

    <!-- ①じゃいけん -->
    <div class="game-card">
      <div class="title-row">
        <img src="Icon.png" class="game-icon">
        <h3>①『じゃいけん』</h3>
      </div>

      <p>CPUとじゃんけんで勝負！運と読みで勝て！</p>

      <button onclick="goGame('https://ffox211310-del.github.io/Janken/')">
        プレイはコチラから！！
      </button>
    </div>

    <!-- ②キャッチ -->
    <div class="game-card">
      <div class="title-row">
        <img src="catchIconNEW.png" class="game-icon">
        <h3>②『キャッチ』</h3>
      </div>

      <p>制限時間以内に落ちてくるものを２０個キャッチしろ！</p>

      <button onclick="goGame('https://ffox211310-del.github.io/catch/')">
        プレイはコチラから！！
      </button>
    </div>

      <div class="game-card">
      <div class="title-row">
        <img src="Mogura.png" class="game-icon">
        <h3>③『シトム叩き』</h3>
      </div>

      <p>出てくるシトムを叩け！！45ポイントでクリア！</p>

      <button onclick="goGame('https://ffox211310-del.github.io/SITMTaTaKi/')">
        プレイはコチラから！！
      </button>
    </div>
    
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Platch Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ロゴ -->
  <img src="Platchlogo.png" class="logo">

  <!-- 説明 -->
  <div class="info">
    <h2>Information</h2>
    <p>色々なミニゲームが遊べます</p>
  </div>

  <!-- ゲーム一覧 -->
  <div class="game-list">

    <!-- ①じゃいけん -->
    <div class="game-card">
      <h3>①『じゃいけん』</h3>
      <p>CPUとじゃんけんで勝負！運と読みで勝て！</p>

      <button onclick="goGame('https://ffox211310-del.github.io/Cha-syuOS/')">
        プレイはコチラから！！
      </button>
    </div>

    <!-- ②キャッチ -->
    <div class="game-card">
      <h3>②『キャッチ』</h3>
      <p>落ちてくるものをタイミングよくキャッチしろ！</p>

      <button onclick="goGame('#')">
        プレイはコチラから！！
      </button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
